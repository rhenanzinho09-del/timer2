<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Timer de Questoes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e0e0e0;font-family:"Inter",-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#000;border:1px solid #2a2a2a;border-radius:10px;padding:32px 36px;width:100%;max-width:420px}
h1,h2{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:28px;font-weight:500}
.divider{border:none;border-top:1px solid #222;margin:24px 0}
.btn{display:block;width:100%;background:#111;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:13px;font-size:15px;font-family:inherit;font-weight:500;cursor:pointer;text-align:center;margin-bottom:8px}
.btn:hover{background:#252525;border-color:#444;color:#fff}
.btn-primary{background:#fff;color:#0e0e0e;border-color:#fff}
.btn-primary:hover{background:#ddd}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.timer-display{font-size:76px;font-weight:300;letter-spacing:4px;color:#fff;text-align:center;margin:28px 0;line-height:1}
.round-badge{display:inline-block;background:#111;border:1px solid #2a2a2a;border-radius:4px;font-size:14px;color:#bbb;padding:6px 14px;margin-bottom:28px;font-weight:500}
.label-phase{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#555;text-align:center;margin-top:8px}
.screen{display:none}
.screen.ativo{display:block}
.preset-row{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.btn-preset{display:block;width:100%;background:#0a0a0a;color:#bbb;border:1px solid #222;border-radius:6px;padding:10px 14px;font-size:13px;font-family:inherit;font-weight:500;cursor:pointer;text-align:left;line-height:1.4}
.btn-preset:hover{background:#1a1a1a;border-color:#444;color:#fff}
.btn-preset.ativo{background:#1a1a1a;border-color:#555;color:#fff}
.btn-preset span{display:block;font-size:11px;color:#555;margin-top:2px;font-weight:400}
.btn-preset.ativo span{color:#888}
</style>
</head>
<body>
<div class="card">

  <div id="t1" class="screen ativo">
    <h1>Timer de Questoes</h1>
    <div class="preset-row">
      <button class="btn-preset" onclick="selecionarPreset(this,300,3,600)">Exatas — Nível 3<span>3 rounds · 5 min · correção 10 min</span></button>
      <button class="btn-preset" onclick="selecionarPreset(this,600,1,600)">Exatas — Nível 4<span>1 round · 10 min · correção 10 min</span></button>
      <button class="btn-preset" onclick="selecionarPreset(this,50,1,240)">Linguagens<span>1 round · 50 seg · correção 4 min</span></button>
    </div>
    <hr class="divider">
    <button class="btn btn-primary" id="btnIniciar" onclick="iniciar()" disabled style="opacity:.35;cursor:default">Iniciar</button>
  </div>

  <div id="t2" class="screen">
    <h2>Resolucao</h2>
    <div id="infoRound" class="round-badge">Round 1 de 3</div>
    <div class="timer-display" id="timerResolucao">00:00</div>
    <div class="label-phase">tempo restante</div>
    <hr class="divider">
    <button class="btn btn-primary" onclick="pausar()" id="btnPausar">Pausar</button>
    <div class="btn-row">
      <button class="btn" onclick="proximoRound()">Proximo Round</button>
      <button class="btn" onclick="pularCorrecao()">Nao Sei / Ver Res.</button>
    </div>
  </div>

  <div id="t3" class="screen">
    <h2>Correcao</h2>
    <div class="timer-display" id="timerCorrecao">00:00</div>
    <div class="label-phase">tempo de correcao</div>
    <hr class="divider">
    <button class="btn btn-primary" onclick="finalizar()">Finalizar Questao</button>
  </div>

</div>

<script>
var cfg = {};
var estado = {round:0, seg:0, pausado:false};
var intervalo = null;
var presetAtual = null;

var actx = null;

function setupAudio() {
  if (actx) return;
  var AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  actx = new AC();
  // nó de silêncio contínuo — mantém o contexto vivo para sempre
  var silencioso = actx.createGain();
  silencioso.gain.value = 0;
  var osc = actx.createOscillator();
  osc.connect(silencioso);
  silencioso.connect(actx.destination);
  osc.start();
}

function tocar() {
  if (!actx) return;
  if (actx.state === 'suspended') actx.resume();
  var now = actx.currentTime;
  for (var i = 0; i < 5; i++) {
    var osc = actx.createOscillator();
    var gain = actx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0, now + i * 0.22);
    gain.gain.linearRampToValueAtTime(0.6, now + i * 0.22 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.22 + 0.18);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start(now + i * 0.22);
    osc.stop(now + i * 0.22 + 0.19);
  }
}

function tela(id) {
  ['t1','t2','t3'].forEach(function(t){
    document.getElementById(t).className = 'screen' + (t===id ? ' ativo' : '');
  });
}

function fmt(s) {
  var m = Math.floor(s/60), r = s%60;
  return (m<10?'0':'')+m+':'+(r<10?'0':'')+r;
}

function selecionarPreset(el, roundSeg, rounds, correcaoSeg) {
  setupAudio();
  document.querySelectorAll('.btn-preset').forEach(function(b){ b.classList.remove('ativo'); });
  el.classList.add('ativo');
  presetAtual = {roundSeg: roundSeg, rounds: rounds, correcaoSeg: correcaoSeg};
  var btn = document.getElementById('btnIniciar');
  btn.disabled = false;
  btn.style.opacity = '1';
  btn.style.cursor = 'pointer';
}

function iniciar() {
  if(!presetAtual) return;
  cfg = {roundSeg: presetAtual.roundSeg, totalRounds: presetAtual.rounds, correcaoSeg: presetAtual.correcaoSeg};
  estado.round = 1;
  iniciarRound();
}

function iniciarRound() {
  clearInterval(intervalo);
  estado.seg = cfg.roundSeg;
  estado.pausado = false;
  document.getElementById('btnPausar').textContent = 'Pausar';
  document.getElementById('infoRound').textContent = 'Round '+estado.round+' de '+cfg.totalRounds;
  document.getElementById('timerResolucao').textContent = fmt(estado.seg);
  tela('t2');
  intervalo = setInterval(tickResolucao, 1000);
}

function tickResolucao() {
  if(estado.pausado) return;
  estado.seg--;
  document.getElementById('timerResolucao').textContent = fmt(estado.seg);
  if(estado.seg <= 0) {
    clearInterval(intervalo);
    tocar();
    if(estado.round < cfg.totalRounds) {
      estado.round++;
      iniciarRound();
    } else {
      iniciarCorrecao();
    }
  }
}

function pausar() {
  estado.pausado = !estado.pausado;
  document.getElementById('btnPausar').textContent = estado.pausado ? 'Retomar' : 'Pausar';
}

function proximoRound() {
  clearInterval(intervalo);
  if(estado.round < cfg.totalRounds) { estado.round++; iniciarRound(); } else { iniciarCorrecao(); }
}

function pularCorrecao() {
  clearInterval(intervalo);
  iniciarCorrecao();
}

function iniciarCorrecao() {
  clearInterval(intervalo);
  estado.seg = cfg.correcaoSeg;
  document.getElementById('timerCorrecao').textContent = fmt(estado.seg);
  tela('t3');
  if(cfg.correcaoSeg > 0) intervalo = setInterval(tickCorrecao, 1000);
}

function tickCorrecao() {
  estado.seg--;
  document.getElementById('timerCorrecao').textContent = fmt(estado.seg);
  if(estado.seg <= 0) {
    clearInterval(intervalo);
    document.getElementById('timerCorrecao').textContent = 'FIM';
    tocar();
  }
}

function finalizar() {
  clearInterval(intervalo);
  tela('t1');
}
</script>
